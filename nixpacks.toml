[providers]
  node = true
  php = true

[phases.setup]
  nixPkgs = ["php84", "php84Packages.composer", "nodejs_20"]

[phases.install]
  cmds = ["npm ci", "composer install --optimize-autoloader --no-dev --ignore-platform-reqs"]

[phases.build]
  cmds = ["npm run build", "php artisan config:cache", "php artisan route:cache", "php artisan view:cache"]

[start]
  cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
